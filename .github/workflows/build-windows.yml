name: Build MetaChat Browser (Windows) [self-hosted]

on:
  workflow_dispatch:
    inputs:
      chromium_commit:
        description: "Chromium base commit"
        required: true
        default: "150.0.7844.0"

env:
  CHROMIUM_COMMIT: ${{ github.event.inputs.chromium_commit || '150.0.7844.0' }}
  CHROMIUM_DIR: C:\chromium
  SRC_DIR: C:\chromium\src
  DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
  vs2022_install: 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools'
  GYP_MSVS_VERSION: "2022"
  SISO_JOBS: 8

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4
        with:
          path: metachat

      - name: Setup depot_tools
        shell: pwsh
        run: |
          # Add depot_tools to PATH for subsequent steps
          echo "C:\depot_tools" | Out-File -FilePath "$env:GITHUB_PATH" -Encoding utf8 -Append
          # Initialize depot_tools (creates python3_bin_reldir.txt)
          C:\depot_tools\update_depot_tools.bat
          if (-not (Test-Path "C:\depot_tools\python3_bin_reldir.txt")) {
            # update_depot_tools.bat didn't create it (common as NETWORK SERVICE).
            # Find real Python 3 and create the file manually.
            # depot_tools is in system PATH (set by Administrator),
            # so its python3.bat wrapper shadows the real Python.
            # Skip depot_tools scripts and find the real Python 3.
            $py = Get-Command python3 -ErrorAction SilentlyContinue `
                | Where-Object { $_.Source -notmatch 'depot_tools' }
            if (-not $py) {
              $py = Get-Command python -ErrorAction SilentlyContinue `
                  | Where-Object { $_.Source -notmatch 'depot_tools' }
            }
            if ($py) {
              $pyDir = (Get-Item $py.Source).DirectoryName
              # depot_tools wrapper looks for python3.exe specifically.
              # If only python.exe exists, create a python3.bat helper.
              if (-not (Test-Path "$pyDir\python3.exe")) {
                if (Test-Path "$pyDir\python.exe") {
                  $wrapper = "@echo off" + [char]10 + "python.exe %*"
                  [System.IO.File]::WriteAllText("$pyDir\python3.bat", $wrapper)
                }
              }
              $rel = [System.IO.Path]::GetRelativePath("C:\depot_tools", $pyDir)
              [System.IO.File]::WriteAllText("C:\depot_tools\python3_bin_reldir.txt", $rel)
              Write-Host "Created python3_bin_reldir.txt -> $rel" -ForegroundColor Green
            } else {
              Write-Host "WARNING: Cannot find Python 3 on system" -ForegroundColor Yellow
            }
          }
          if (Test-Path "C:\depot_tools\python3_bin_reldir.txt") {
            Write-Host "depot_tools initialized OK" -ForegroundColor Green
          } else {
            Write-Host "WARNING: python3_bin_reldir.txt still missing, will try native binaries" -ForegroundColor Yellow
          }
      - name: Reset and apply metachat-all.patch
        shell: pwsh
        run: |
          cd $env:SRC_DIR

          # Reset tracked files to pristine state
          git checkout -f HEAD
          # Remove untracked files left from previous patch runs
          git clean -fd
          $patchFile = "$env:GITHUB_WORKSPACE\metachat\browser\patches\metachat-all.patch"
          Write-Host "Applying metachat-all.patch..."
          git apply --reject --binary --whitespace=fix $patchFile 2>&1
          if (-not $?) { exit 1 }
          $rejCount = (Get-ChildItem -Recurse -Filter "*.rej" -Name).Count
          if ($rejCount -gt 0) {
            Write-Host "PATCH FAILED: $rejCount reject files" -ForegroundColor Red
            Get-ChildItem -Recurse -Filter "*.rej" | Select-Object -ExpandProperty FullName
            exit 1
          }
          Write-Host "Patch applied OK" -ForegroundColor Green

      - name: Overlay assets
        shell: pwsh
        run: |
          $src = "$env:GITHUB_WORKSPACE\metachat\browser\assets"
          if (Test-Path $src) { robocopy $src "$env:SRC_DIR" /E /NJH /NJS /NP; if ($LASTEXITCODE -ge 8) { exit 1 } }; exit 0

      - name: Download fonts (if missing)
        shell: pwsh
        run: |
          $fontDir = "$env:SRC_DIR\third_party\lean_windows_fonts"
          if (-not (Test-Path "$fontDir\Arimo-VF.ttf")) {
            New-Item -ItemType Directory -Force -Path $fontDir
            $baseUrl = "https://raw.githubusercontent.com/arman-bd/chromiumfish/v149.0.7827.115/assets/third_party/lean_windows_fonts"
            $fonts = @(
              "Arimo-VF-Italic.ttf","Arimo-VF.ttf",
              "Caladea-Bold.ttf","Caladea-BoldItalic.ttf","Caladea-Italic.ttf","Caladea-Regular.ttf",
              "Carlito-Bold.ttf","Carlito-BoldItalic.ttf","Carlito-Italic.ttf","Carlito-Regular.ttf",
              "ComicRelief-Bold.ttf","ComicRelief-Regular.ttf",
              "Cousine-Bold.ttf","Cousine-BoldItalic.ttf","Cousine-Italic.ttf","Cousine-Regular.ttf",
              "OpenSans-Regular.ttf",
              "Tinos-Bold.ttf","Tinos-BoldItalic.ttf","Tinos-Italic.ttf","Tinos-Regular.ttf"
            )
            foreach ($font in $fonts) {
              $url = "$baseUrl/$font"
              $outPath = "$fontDir\$font"
              if (-not (Test-Path $outPath)) {
                Write-Host "Downloading $font"
                Invoke-WebRequest -Uri $url -OutFile $outPath -UseBasicParsing
              }
            }
          } else { Write-Host "Fonts already exist" }

      - name: Build overrides
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:SRC_DIR\build_overrides"
          [System.IO.File]::WriteAllText("$env:SRC_DIR\build_overrides\pdfium.gni", (
            "declare_args() {" + [char]10 +
            "  pdf_enable_v8_override = true" + [char]10 +
            "  pdf_enable_xfa_override = false" + [char]10 +
            "  pdf_use_partition_alloc_override = false" + [char]10 +
            "  pdf_use_skia_override = true" + [char]10 +
            '  pdf_skia_font_manager_target_override = ""' + [char]10 +
            "  pdf_enable_fontations_override = false" + [char]10 +
            "  pdf_enable_rust_png_override = true" + [char]10 +
            "  pdf_bundle_freetype_override = false" + [char]10 +
            "}"
          ), [System.Text.UTF8Encoding]::new($false))

      - name: Download toolchains (if missing)
        shell: pwsh
        run: |
          cd $env:SRC_DIR
          $stampPath = "third_party/llvm-build/Release+Asserts/cr_build_revision"
          if (-not (Test-Path $stampPath)) {
            $deps = Get-Content DEPS -Raw
            if ($deps -match 'Win/clang-([a-z0-9-]+)\.tar\.xz') {
              $rev = $matches[1]
            } else {
              $rev = "llvmorg-23-init-10931-g20b6ec66-11"
            }
            New-Item -ItemType Directory -Force -Path (Split-Path $stampPath)
            Set-Content -Path $stampPath -Value "$rev" -NoNewline
          }
          if (-not (Test-Path "third_party/rust-toolchain/VERSION")) {
            python3 tools\rust\update_rust.py
          }

      - name: Run gclient hooks (restores modified dependencies)
        shell: pwsh
        run: |
          cd $env:CHROMIUM_DIR
          gclient runhooks
      - name: Generate LASTCHANGE
        shell: pwsh
        run: |
          cd $env:SRC_DIR
          $timestamp = git log -1 --format='%ct' HEAD
          $commit = git log -1 --format='%H' HEAD
          Set-Content -Path build/util/LASTCHANGE -Value "LASTCHANGE=$commit"
          Set-Content -Path build/util/LASTCHANGE.committime -Value $timestamp -NoNewline

      - name: Configure GN
        shell: pwsh
        run: |
          cd $env:SRC_DIR
          New-Item -ItemType Directory -Force -Path out\Release_GN_x64
          [System.IO.File]::WriteAllText("$env:SRC_DIR\out\Release_GN_x64\args.gn", (
            "is_debug = false" + [char]10 +
            "is_component_build = false" + [char]10 +
            "symbol_level = 0" + [char]10 +
            "blink_symbol_level = 0" + [char]10 +
            "v8_symbol_level = 0" + [char]10 +
            "enable_nacl = false" + [char]10 +
            "enable_remoting = false" + [char]10 +
            "enable_extensions = true" + [char]10 +
            "enable_plugins = true" + [char]10 +
            "enable_widevine = false" + [char]10 +
            "enable_swiftshader = false" + [char]10 +
            "enable_pdf = true" + [char]10 +
            "enable_pdfium = true" + [char]10 +
            "enable_printing = true" + [char]10 +
            "enable_print_preview = true" + [char]10 +
            "treat_warnings_as_errors = false" + [char]10 +
            'google_api_key = ""' + [char]10 +
            "use_unofficial_version_number = false" + [char]10 +
            "chrome_pgo_phase = 0" + [char]10 +
            "enable_extensions_core = true" + [char]10 +
            "dawn_enable_vulkan_validation_layers = false" + [char]10 +
            "angle_enable_vulkan_validation_layers = false"
          ))
          if (Test-Path "C:\depot_tools\python3_bin_reldir.txt") {
            gn gen out\Release_GN_x64
          } else {
            Write-Host "Using native gn.exe from buildtools" -ForegroundColor Yellow
            & "$env:SRC_DIR\buildtools\win\gn.exe" gen out\Release_GN_x64
          }

      - name: Build
        shell: pwsh
        run: |
          cd $env:SRC_DIR
          if (Test-Path "C:\depot_tools\python3_bin_reldir.txt") {
            autoninja -C out\Release_GN_x64 chrome
          } else {
            Write-Host "Using native ninja.exe from third_party" -ForegroundColor Yellow
            $ramGB = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB)
            $jobs = [math]::Max(2, [math]::Min($ramGB, 32))
            & third_party\ninja\ninja.exe -j $jobs -C out\Release_GN_x64 chrome
          }

      - name: Package
        shell: pwsh
        run: |
          $outDir = "$env:SRC_DIR\out\Release_GN_x64"
          $dest = "${{ runner.temp }}\metachat-pkg"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item "$outDir\chrome.exe" "$dest\MetaChat.exe"
          Copy-Item "$outDir\*.dll" $dest
          Copy-Item "$outDir\*.pak" $dest
          Copy-Item "$outDir\*.bin" $dest -ErrorAction SilentlyContinue
          if (Test-Path "$outDir\locales") { Copy-Item -Recurse "$outDir\locales" $dest }
          Compress-Archive -Path "$dest\*" -DestinationPath "${{ github.workspace }}\metachat-browser-windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: metachat-browser-windows
          path: metachat-browser-windows.zip

